name: Direct Deploy Azure Functions (No Slots)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: ddns-direct-production
  cancel-in-progress: false

env:
  PACKAGE_PATH: artifacts/functionapp.zip

jobs:
  validate_and_package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $files = @(
            'UpdateStargateIPv4Address/run.ps1',
            'UpdateStargateIPv6Address/run.ps1',
            'profile.ps1'
          )

          foreach ($file in $files) {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$parseErrors) | Out-Null

            if ($parseErrors.Count -gt 0) {
              $parseErrors | ForEach-Object { Write-Error "${file}: $($_.Message)" }
              throw "PowerShell syntax validation failed."
            }
          }

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run Pester tests
        shell: pwsh
        run: |
          $pesterModule = Get-Module -ListAvailable -Name Pester | Sort-Object Version -Descending | Select-Object -First 1
          Import-Module $pesterModule -Force
          Invoke-Pester -Path ./tests

      - name: Create deployment package
        shell: bash
        run: |
          mkdir -p artifacts
          zip -r "$PACKAGE_PATH" . \
            -x ".git/*" \
               ".github/*" \
               ".vscode/*" \
               "local.settings.json" \
               "__blobstorage__/*" \
               "__queuestorage__/*" \
               "__azurite_db*__.json" \
               ".azurite/*"

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: functionapp-package
          path: ${{ env.PACKAGE_PATH }}
          if-no-files-found: error

  deploy_to_production:
    needs: validate_and_package
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download deployment package
        uses: actions/download-artifact@v4
        with:
          name: functionapp-package
          path: artifacts

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy package to production
        shell: bash
        run: |
          az functionapp deployment source config-zip \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_FUNCTIONAPP_NAME }}" \
            --src "${{ env.PACKAGE_PATH }}"

  smoke_test_production:
    needs: deploy_to_production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Smoke test IPv4 endpoint (production)
        shell: pwsh
        run: |
          ./.github/scripts/smoke-test.ps1 \
            -FunctionUrl "${{ secrets.PROD_IPV4_FUNCTION_URL }}" \
            -Zone "${{ vars.SMOKE_ZONE }}" \
            -Name "${{ vars.SMOKE_IPV4_RECORD }}" \
            -ReqIp "${{ vars.SMOKE_IPV4_ADDRESS }}"

      - name: Smoke test IPv6 endpoint (production)
        shell: pwsh
        run: |
          ./.github/scripts/smoke-test.ps1 \
            -FunctionUrl "${{ secrets.PROD_IPV6_FUNCTION_URL }}" \
            -Zone "${{ vars.SMOKE_ZONE }}" \
            -Name "${{ vars.SMOKE_IPV6_RECORD }}" \
            -ReqIp "${{ vars.SMOKE_IPV6_ADDRESS }}"

  backoff_on_smoke_failure:
    if: ${{ always() && needs.deploy_to_production.result == 'success' && needs.smoke_test_production.result == 'failure' }}
    needs:
      - deploy_to_production
      - smoke_test_production
    runs-on: ubuntu-latest

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Disable both update functions (backoff)
        shell: bash
        run: |
          az functionapp config appsettings set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_FUNCTIONAPP_NAME }}" \
            --settings \
              AzureWebJobs.UpdateStargateIPv4Address.Disabled=true \
              AzureWebJobs.UpdateStargateIPv6Address.Disabled=true

      - name: Emit operator warning
        shell: bash
        run: |
          echo "Smoke tests failed after direct production deploy."
          echo "Both functions were disabled as a backoff safety action."
          echo "Investigate logs, fix issue, then re-enable by setting both Disabled flags to false."
