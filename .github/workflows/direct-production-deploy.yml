name: Direct Deploy Azure Functions (No Slots)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: ddns-direct-production
  cancel-in-progress: false

env:
  PACKAGE_PATH: artifacts/functionapp.zip

jobs:
  validate_and_package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $files = @(
            'UpdateStargateIPv4Address/run.ps1',
            'UpdateStargateIPv6Address/run.ps1',
            'profile.ps1'
          )

          foreach ($file in $files) {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$parseErrors) | Out-Null

            if ($parseErrors.Count -gt 0) {
              $parseErrors | ForEach-Object { Write-Error "${file}: $($_.Message)" }
              throw "PowerShell syntax validation failed."
            }
          }

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run Pester tests
        shell: pwsh
        run: |
          $pesterModule = Get-Module -ListAvailable -Name Pester | Sort-Object Version -Descending | Select-Object -First 1
          Import-Module $pesterModule -Force
          Invoke-Pester -Path ./tests

      - name: Create deployment metadata
        shell: bash
        run: |
          mkdir -p artifacts
          cat > artifacts/deployment-metadata.json <<EOF
          {
            "repository": "${{ github.repository }}",
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "actor": "${{ github.actor }}",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Create deployment package
        shell: bash
        run: |
          mkdir -p artifacts
          zip -r "$PACKAGE_PATH" . \
            -x ".git/*" \
               ".github/*" \
               ".vscode/*" \
               "local.settings.json" \
               "__blobstorage__/*" \
               "__queuestorage__/*" \
               "__azurite_db*__.json" \
               ".azurite/*"

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: functionapp-package
          path: ${{ env.PACKAGE_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload deployment metadata
        uses: actions/upload-artifact@v4
        with:
          name: deployment-metadata
          path: artifacts/deployment-metadata.json
          if-no-files-found: error
          retention-days: 30

  deploy_to_production:
    needs: validate_and_package
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download deployment package
        uses: actions/download-artifact@v4
        with:
          name: functionapp-package
          path: artifacts

      - name: Download deployment metadata
        uses: actions/download-artifact@v4
        with:
          name: deployment-metadata
          path: artifacts

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Re-enable both update functions before deploy
        shell: bash
        run: |
          az functionapp config appsettings set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_FUNCTIONAPP_NAME }}" \
            --settings \
              AzureWebJobs.UpdateStargateIPv4Address.Disabled=false \
              AzureWebJobs.UpdateStargateIPv6Address.Disabled=false

      - name: Deploy package to production (with retry)
        shell: bash
        run: |
          set -o pipefail

          max_attempts=5
          attempt=1
          sleep_seconds=20

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Zip deploy attempt $attempt/$max_attempts"

            if az functionapp deployment source config-zip \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --name "${{ vars.AZURE_FUNCTIONAPP_NAME }}" \
              --src "${{ env.PACKAGE_PATH }}"; then
              echo "Zip deployment succeeded on attempt $attempt."
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Zip deployment failed on attempt $attempt. Retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
              sleep_seconds=$((sleep_seconds * 2))
            else
              echo "::error title=Zip deployment failed::All $max_attempts deployment attempts failed."
              echo "Collecting lightweight diagnostics (safe fields only)."

              az functionapp show \
                --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
                --name "${{ vars.AZURE_FUNCTIONAPP_NAME }}" \
                --query "{state:state, kind:kind, defaultHostName:defaultHostName, enabledHostNames:enabledHostNames}" \
                -o json || true

              az functionapp config appsettings list \
                --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
                --name "${{ vars.AZURE_FUNCTIONAPP_NAME }}" \
                --query "[?name=='WEBSITE_CONTENTSHARE' || name=='WEBSITE_CONTENTAZUREFILECONNECTIONSTRING' || name=='WEBSITE_RUN_FROM_PACKAGE'].name" \
                -o tsv || true

              exit 1
            fi
          done

  smoke_test_production:
    needs: deploy_to_production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate smoke test inputs
        shell: bash
        env:
          PROD_IPV4_FUNCTION_URL: ${{ secrets.PROD_IPV4_FUNCTION_URL }}
          PROD_IPV6_FUNCTION_URL: ${{ secrets.PROD_IPV6_FUNCTION_URL }}
          SMOKE_ZONE: ${{ vars.SMOKE_ZONE }}
          SMOKE_IPV4_RECORD: ${{ vars.SMOKE_IPV4_RECORD }}
          SMOKE_IPV6_RECORD: ${{ vars.SMOKE_IPV6_RECORD }}
          SMOKE_IPV4_ADDRESS: ${{ vars.SMOKE_IPV4_ADDRESS }}
          SMOKE_IPV6_ADDRESS: ${{ vars.SMOKE_IPV6_ADDRESS }}
        run: |
          missing=0

          check_required() {
            local key="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error title=Missing smoke input::${key} is missing or empty."
              missing=1
            fi
          }

          check_required "PROD_IPV4_FUNCTION_URL" "$PROD_IPV4_FUNCTION_URL"
          check_required "PROD_IPV6_FUNCTION_URL" "$PROD_IPV6_FUNCTION_URL"
          check_required "SMOKE_ZONE" "$SMOKE_ZONE"
          check_required "SMOKE_IPV4_RECORD" "$SMOKE_IPV4_RECORD"
          check_required "SMOKE_IPV6_RECORD" "$SMOKE_IPV6_RECORD"
          check_required "SMOKE_IPV4_ADDRESS" "$SMOKE_IPV4_ADDRESS"
          check_required "SMOKE_IPV6_ADDRESS" "$SMOKE_IPV6_ADDRESS"

          if [ -n "$PROD_IPV4_FUNCTION_URL" ] && [[ "$PROD_IPV4_FUNCTION_URL" != *"code="* ]]; then
            echo "::error title=Invalid smoke input::PROD_IPV4_FUNCTION_URL must include a function key query parameter (code=...)."
            missing=1
          fi

          if [ -n "$PROD_IPV6_FUNCTION_URL" ] && [[ "$PROD_IPV6_FUNCTION_URL" != *"code="* ]]; then
            echo "::error title=Invalid smoke input::PROD_IPV6_FUNCTION_URL must include a function key query parameter (code=...)."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo "Smoke test input validation failed."
            exit 1
          fi

          echo "Smoke test inputs validated."

      - name: Smoke test IPv4 endpoint (production)
        shell: pwsh
        run: |
          ./.github/scripts/smoke-test.ps1 `
            -FunctionUrl "${{ secrets.PROD_IPV4_FUNCTION_URL }}" `
            -Zone "${{ vars.SMOKE_ZONE }}" `
            -Name "${{ vars.SMOKE_IPV4_RECORD }}" `
            -ReqIp "${{ vars.SMOKE_IPV4_ADDRESS }}"

      - name: Smoke test IPv6 endpoint (production)
        shell: pwsh
        run: |
          ./.github/scripts/smoke-test.ps1 `
            -FunctionUrl "${{ secrets.PROD_IPV6_FUNCTION_URL }}" `
            -Zone "${{ vars.SMOKE_ZONE }}" `
            -Name "${{ vars.SMOKE_IPV6_RECORD }}" `
            -ReqIp "${{ vars.SMOKE_IPV6_ADDRESS }}"

  backoff_on_smoke_failure:
    if: ${{ always() && needs.deploy_to_production.result == 'success' && needs.smoke_test_production.result == 'failure' }}
    needs:
      - deploy_to_production
      - smoke_test_production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Disable both update functions (backoff)
        shell: bash
        run: |
          az functionapp config appsettings set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_FUNCTIONAPP_NAME }}" \
            --settings \
              AzureWebJobs.UpdateStargateIPv4Address.Disabled=true \
              AzureWebJobs.UpdateStargateIPv6Address.Disabled=true

      - name: Write incident summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Production Backoff Triggered

          Smoke tests failed after direct production deployment.

          Actions taken:

          1. Disabled UpdateStargateIPv4Address
          2. Disabled UpdateStargateIPv6Address

          Immediate next steps:

          1. Review workflow logs and Azure Function logs
          2. Fix the issue and redeploy
          3. Re-enable functions using the re-enable workflow
          EOF

          echo "::error title=Production smoke test failed::Both DDNS functions were disabled as an automatic backoff action."

      - name: Create incident report artifact
        shell: bash
        run: |
          cat > incident-report.txt <<EOF
          Production smoke tests failed after direct deployment.
          Repository: ${{ github.repository }}
          Ref: ${{ github.ref }}
          SHA: ${{ github.sha }}
          Run ID: ${{ github.run_id }}
          Run Attempt: ${{ github.run_attempt }}
          Function App: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          Resource Group: ${{ vars.AZURE_RESOURCE_GROUP }}
          Backoff Action: Disabled UpdateStargateIPv4Address and UpdateStargateIPv6Address
          Timestamp UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF

      - name: Upload incident report
        uses: actions/upload-artifact@v4
        with:
          name: production-backoff-incident-report
          path: incident-report.txt
          if-no-files-found: error
          retention-days: 30
